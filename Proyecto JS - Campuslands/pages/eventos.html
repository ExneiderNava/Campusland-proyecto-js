<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Eventos - Eventify Campus</title>
    <link rel="icon" href="../resources/img/logo.jpeg">
    <link rel="stylesheet" href="../css/eventos.css">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body>
    <div class="main-layout">
        <div id="sidebar-container"></div>

        <main class="dashboard-container">
            <section class="content">
                <header class="content-header">
                    <h1>Gestión de Eventos</h1>
                    <button id="btn-nuevo-evento" class="btn-primary">+ Agregar Evento</button>
                </header>

                <section class="table-container">
                    <table id="tabla-eventos">
                        <thead>
                            <tr>
                                <th>Imagen</th>
                                <th>Nombre</th>
                                <th>Categoría</th>
                                <th>Ciudad</th>
                                <th>Precio</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="body-eventos">
                        </tbody>
                    </table>
                </section>
            </section>
        </main>
    </div>

    <!-- MODAL -->
    <div id="eventos-modal" class="modal-overlay">
        <div class="eventos-modal-content">
            <h2 id="eventos-modal-titulo">Nuevo Evento</h2>
            <form id="eventos-form">
                <input type="hidden" id="eventos-id">

                <div class="form-group">
                    <label>Nombre del Evento</label>
                    <input type="text" id="eventos-nombre" required>
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <select id="eventos-categoria" required></select>
                </div>
                <div class="form-group">
                    <label>Ciudad</label>
                    <select id="eventos-ciudad" required>
                        <option value="">Seleccione una ciudad</option>
                    </select>
                    <button type="button" id="btn-mostrar-nueva-ciudad" style="margin-top:5px;">+ Agregar otra ciudad</button>
                    <div id="nueva-ciudad-div" hidden style="margin-top:5px; display:flex; gap:8px;">
                        <input type="text" id="eventos-nueva-ciudad" placeholder="Nombre de la ciudad">
                        <button type="button" id="boton-agregar-ciudad">Agregar</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Precio</label>
                    <input type="number" id="eventos-precio" required>
                </div>
                <div class="form-group">
                    <label>Fecha y Hora</label>
                    <input type="datetime-local" id="eventos-fecha-hora" required>
                </div>
                <div class="form-group">
                    <label>URL de Imagen</label>
                    <input type="url" id="eventos-img" required>
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="eventos-desc" required></textarea>
                </div>

                <button type="submit" class="btn-save">Guardar Evento</button>
                <button type="button" id="eventos-btn-cancelar" class="btn-cancel">Cancelar</button>
            </form>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/eventos.js"></script>
</body>

</html>
