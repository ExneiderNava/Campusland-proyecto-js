<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventify campus</title>
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/layouts.css">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body class="login-body">
    <header>
        <h1 class="titulo">Eventify campus</h1>
        <p>Gestión Corporativa de Alto Nivel</p>
    </header>

    <main class="login-main">
        <h2 class="subtitulo">Bienvenido</h2>
        <p>Inicie sesión para acceder a su panel</p>

        <form>

            <label for="correo">Correo Electrónico</label><br>
            <input type="email" id="correo" placeholder="nombre@empresa.com">

            <br><br>

            <label for="contrasena">Contraseña</label><br>
            <input type="password" id="contrasena">

            <br><br>

            <button type="submit">Iniciar Sesión</button>

            <a href="../index.html">Volver</a>

        </form>

        <hr>


        <footer>
            <p>© 2026 Eventify campus</p>
        </footer>
    </main>
    <script src="../js/login.js"></script>
</body>

</html>
