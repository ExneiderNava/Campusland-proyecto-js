<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Categorías - Eventify Campus</title>
    <link rel="icon" href="../resources/img/logo.jpeg">
    <link rel="stylesheet" href="../css/categorias.css">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body>

    <div class="main-layout">

        <div id="sidebar-container"></div>

        <main class="dashboard-container">

            <section class="content">
                <header class="content-header">
                    <h1>Categorías</h1>
                    <button id="btn-nueva-categoria" class="btn-primary">+ Agregar Categoría</button>
                </header>

                <section class="table-container">
                    <table id="tabla-categorias">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Descripción</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </section>
            </section>
        </main>
    </div>

    <div id="modal-categoria" class="modal-categoria">
        <div class="modal-content-categoria">
            <h2 id="modal-titulo">Nueva Categoría</h2>
            <form id="form-categoria">
                <input type="hidden" id="cat-id">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="cat-nombre" required>
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="cat-desc"></textarea>
                </div>
                <button type="submit" class="btn-save">Guardar</button>
            </form>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/categorias.js"></script>

</body>

</html>
