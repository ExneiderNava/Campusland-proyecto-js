<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Eventos</title>
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/animations.css">
</head>

<body>


    <header>
        <h1>Gestión de Eventos</h1>

        <input type="text" placeholder="Buscar evento...">
    </header>

    <hr>

    <section>
        <h1>Buscar Eventos</h1>

        <label>Nombre del evento</label><br>
        <input type="text" placeholder="Ej: Conferencia"><br><br>

        <label>Categoría</label><br>
        <select>
            <option>Todas</option>
            <option>Tecnología</option>
            <option>Deportes</option>
            <option>Gastronomía</option>
            <option>Negocios</option>
        </select><br><br>

        <label>Ciudad</label><br>
        <input type="text" placeholder="Ciudad"><br><br>

        <button>Buscar</button>
    </section>

    <hr>


    <section>

        <h1>Eventos disponibles</h1>

        <article>
            <img src="https://www.instagram.com/p/DVRG0eQDOFk/" alt="Evento">
            <h2>Conferencia de Tecnología</h2>
            <p><strong>Fecha:</strong> 24/10/2026</p>
            <p><strong>Lugar:</strong> cucuta</p>
            <p><strong>Precio:</strong> $120.000</p>

            <button>Ver</button>
            <button>Reservar</button>
        </article>

        <br>

        <article>
            <img src="https://via.placeholder.com/250x150" alt="Evento">
            <h2>Noche Empresarial</h2>
            <p><strong>Fecha:</strong> 15/09/2026</p>
            <p><strong>Lugar:</strong> bogota</p>
            <p><strong>Precio:</strong> Gratis</p>

            <button>Ver</button>
            <button>Reservar</button>
        </article>

        <br>

        <article>
            <img src="https://via.placeholder.com/250x150" alt="Evento">
            <h2>Maratón Urbana</h2>
            <p><strong>Fecha:</strong> 12/12/2026</p>
            <p><strong>Lugar:</strong>cali</p>
            <p><strong>Precio:</strong> $25.000</p>

            <button>Ver</button>
            <button>Reservar</button>
        </article>

    </section>

</body>

</html>
